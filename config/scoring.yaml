project:
  name: east_africa_credit_scoring
  version: "2.0.0"
  random_state: 42

data:
  n_samples: 8000
  default_rate: 0.12
  channel_distribution:
    mpesa: 0.30
    mobile_lender: 0.25
    sacco: 0.25
    bank: 0.20

training:
  test_size: 0.20
  validation_size: 0.15
  model_type: gradient_boosting  # logistic_regression | gradient_boosting
  class_weight: balanced
  calibration: true

scorecard:
  base_score: 680
  base_odds: 50
  pdo: 20
  min_score: 300
  max_score: 850

decision_bands:
  approve: 680
  review: 550

policy:
  min_age: 18
  max_debt_to_income: 0.45
  max_crb_defaults: 0
  min_monthly_income_kes: 15000
  require_crb_above_limit_kes: 100000

channel_minimums:
  mpesa:
    min_kyc_tier: 2
    max_fuliza_utilization: 0.85
    min_wallet_activity_days_90d: 30
  sacco:
    min_membership_months: 6
    min_share_capital_kes: 5000
    min_repayment_rate: 0.85
  bank:
    min_account_age_months: 6
    max_bounced_cheques_12m: 1
    min_avg_balance_kes: 10000
  mobile_lender:
    min_platform_tenure_months: 1
    min_platform_repayment_rate: 0.80
    max_active_digital_loans: 2
    max_rollover_count_12m: 3

loan_limits:
  round_to_kes: 500
  max_income_multiple: 0.40
  score_multipliers:
    approve: 1.00
    review: 0.55
    decline: 0.00
  repayment_adjustments:
    streak_3_multiplier: 1.15
    streak_6_multiplier: 1.30
    rate_above_95_multiplier: 1.10
    recent_default_multiplier: 0.50
    poor_rate_multiplier: 0.70
  alternative_data_adjustments:
    income_verified_multiplier: 1.08
    high_gambling_multiplier: 0.85
    loan_stacking_apps_multiplier: 0.75
  tiers:
    starter: 0
    bronze: 15000
    silver: 50000
    gold: 150000
    platinum: 300000
  channels:
    mpesa:
      min_limit_kes: 1000
      max_limit_kes: 75000
      first_time_base_kes: 5000
    mobile_lender:
      min_limit_kes: 500
      max_limit_kes: 100000
      first_time_base_kes: 3000
    sacco:
      min_limit_kes: 5000
      max_limit_kes: 500000
      first_time_base_kes: 25000
    bank:
      min_limit_kes: 10000
      max_limit_kes: 2000000
      first_time_base_kes: 50000

paths:
  model_dir: models
  reports_dir: assets
